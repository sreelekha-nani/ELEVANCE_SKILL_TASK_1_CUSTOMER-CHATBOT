{% extends "base.html" %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="text-center text-muted mb-4">Start your premium experience</p>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="johndoe" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="name@company.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <p class="text-center mt-4 text-muted">
            Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none" style="color: var(--primary-color);">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
